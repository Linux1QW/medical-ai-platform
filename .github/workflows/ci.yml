name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test_db
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests with coverage
        env:
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: test
          MYSQL_DATABASE: test_db
          REDIS_CHECKPOINT_URL: redis://localhost:6379/1
          SECRET_KEY: test-secret-key-for-ci
          DASHSCOPE_API_KEY: test-key
          LANGGRAPH_ENABLED: 'false'
          TESTING: 'true'
          AUDIT_LOG_ENABLED: 'true'
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing

      - name: Run RAG eval smoke test (mock mode)
        env:
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: test
          MYSQL_DATABASE: test_db
          REDIS_CHECKPOINT_URL: redis://localhost:6379/1
          SECRET_KEY: test-secret-key-for-ci
          DASHSCOPE_API_KEY: test-key
          LANGGRAPH_ENABLED: 'false'
          TESTING: 'true'
        run: |
          cd backend
          python -m evaluation.rag_eval --mode mock --limit 5 2>&1 || echo "Eval smoke completed with warnings"

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Verify database migrations
        run: |
          until mysqladmin ping -h 127.0.0.1 -P 3306 -u root -ptest --silent; do
            sleep 2
          done
          mysql -h 127.0.0.1 -P 3306 -u root -ptest medical_ai < database/init.sql
          for f in database/migrate_v*.sql; do
            echo "Applying $f..."
            mysql -h 127.0.0.1 -P 3306 -u root -ptest medical_ai < "$f" || echo "Warning: $f had issues"
          done

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run lint
          npm run build

      - name: Check build output
        run: |
          if [ -d "frontend/dist" ]; then
            echo "Build successful: dist directory exists"
            ls -la frontend/dist/
          else
            echo "Build failed: dist directory not found"
            exit 1
          fi

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          pip install ruff mypy
          pip install types-requests types-redis

      - name: Run ruff
        run: |
          ruff check backend/

      - name: Run mypy
        run: |
          cd backend
          mypy app/ --ignore-missing-imports --no-error-summary 2>&1 | head -50 || true

      - name: Check Python syntax
        run: |
          cd backend
          python -m compileall app/ -q

  docker-build:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          target: production
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          target: production
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest
