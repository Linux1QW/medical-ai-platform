# ============================================
# Docker Compose - Staging Environment
# ============================================
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
# ============================================

services:
  backend:
    image: ghcr.io/${REPO}/backend:latest
    build: !reset null
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --workers 2
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - ENVIRONMENT=staging
      - LOG_LEVEL=INFO

  frontend:
    image: ghcr.io/${REPO}/frontend:latest
    build: !reset null
