# ============================================
# Docker Compose Override - 本地开发环境
# ============================================
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
# 或: docker compose --profile dev up -d
# ============================================

services:

  # ── Backend 开发模式（热重载 + 调试） ──────
  backend:
    build:
      target: development
    environment:
      # 开发环境使用更宽松的 CORS
      CORS_ORIGINS: '["http://localhost:5173", "http://localhost:3000", "http://localhost:80", "http://localhost"]'
    volumes:
      # 源码挂载实现热重载
      - ./backend/app:/app/backend/app:cached
      - ./backend/tests:/app/backend/tests:cached
      - ./database:/app/database:cached
      - chroma_data:/app/backend/data
      - ./data:/app/backend/data/medical_pdfs:ro
    ports:
      - "8000:8000"
    # 开发环境不需要健康检查那么严格
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Frontend 开发模式（Vite dev server） ──
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      target: builder
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend/src:/app/src:cached
      - ./frontend/public:/app/public:cached
      - ./frontend/package.json:/app/package.json:cached
      - ./frontend/vite.config.ts:/app/vite.config.ts:cached
      - ./frontend/tsconfig.json:/app/tsconfig.json:cached
      - ./frontend/index.html:/app/index.html:cached
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    # 开发模式不依赖 backend 健康检查
    deploy:
      resources:
        limits:
          memory: 512M

  # ── MySQL 开发配置（暴露端口 + 更大内存） ──
  mysql:
    ports:
      - "3306:3306"
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Redis 开发配置 ──
  redis:
    ports:
      - "6379:6379"
